<!DOCTYPE html>
<html lang="pt-BR" class="viewer-html">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="viewer-page">
  <main class="container">
    <section id="joinPanel" class="panel">
      <h2>Viewer</h2>
      <p>Digite o código da sala.</p>
      <input id="roomCode" placeholder="Ex: ABCD12" maxlength="6" />
      <button id="joinBtn">Entrar</button>
      <br>
      <a class="back-link" href="games.html">← Voltar</a>
    </section>

    <section id="viewerPanel" class="viewer-stage hidden">
      <div id="viewerContent"></div>
    </section>
  </main>

  <script type="module">
    import { db, ref, get, onValue } from './firebase.js';

    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    if (params.get('room')) $('roomCode').value = params.get('room');

    let roomCode = localStorage.getItem('viewerRoomCode') || params.get('room') || '';
    if (roomCode) $('roomCode').value = roomCode;

    const roomRef = () => ref(db, `rooms/${roomCode}`);
    window.addEventListener('resize', () => requestAnimationFrame(fitViewerToScreen));

    $('joinBtn').onclick = async () => {
      roomCode = $('roomCode').value.trim().toUpperCase();
      if (!roomCode) return alert('Digite o código da sala.');

      const snap = await get(roomRef());
      if (!snap.exists()) return alert('Sala não encontrada.');

      localStorage.setItem('viewerRoomCode', roomCode);
      $('joinPanel').classList.add('hidden');
      $('viewerPanel').classList.remove('hidden');
      listenRoom();
    };

    function listenRoom() {
      onValue(roomRef(), (snap) => {
        const room = snap.val();
        if (!room) return;
        applyDesign(room.design);
        render(room);
        requestAnimationFrame(fitViewerToScreen);
      });
    }

    function applyDesign(design = {}) {
      if (design.primaryColor) document.documentElement.style.setProperty('--primary', design.primaryColor);
      if (design.backgroundColor) document.documentElement.style.setProperty('--bg', design.backgroundColor);
      if (design.fontFamily) document.body.style.fontFamily = design.fontFamily;

      const theme = design.viewerTheme || design.theme || 'neon';
      [...document.body.classList].forEach(className => {
        if (className.startsWith('theme-')) document.body.classList.remove(className);
      });
      document.body.classList.add(`theme-${theme}`);
    }

    function render(room) {
      const content = $('viewerContent');
      const q = room.currentQuestion;

      if (room.status === 'ended') {
        content.innerHTML = `
          <h1 class="question">Jogo encerrado</h1>
          ${scoreboard(room.players)}
        `;
        return;
      }

      if (room.status === 'showing_results' && q) {
        content.innerHTML = renderResults(room);
        return;
      }

      if (q && q.visibleToViewer && room.status === 'answering') {
        content.innerHTML = `
          <p class="viewer-meta">${escapeHtml(room.title || '')} • sala ${roomCode}</p>
          <h1 class="question ${q.text.length > 90 ? 'long-question' : ''}">${escapeHtml(q.text)}</h1>
        `;
        return;
      }

      content.innerHTML = `
        <div class="waiting-view">
          <p class="viewer-meta">Código da sala</p>
          <div class="big-code">${roomCode}</div>
          <h2>Aguardando o Master...</h2>
          ${scoreboard(room.players)}
        </div>
      `;
    }

    function scoreboard(players = {}) {
      const entries = Object.values(players).sort((a, b) => (b.score || 0) - (a.score || 0));
      if (!entries.length) return '<p class="muted">Aguardando jogadores...</p>';
      return `
        <div class="panel scoreboard viewer-scoreboard">
          <h2>Pontuação</h2>
          <div class="list viewer-score-list">
            ${entries.map(p => `<div class="item"><strong>${escapeHtml(p.name)}</strong><span>${p.score || 0} pts</span></div>`).join('')}
          </div>
        </div>
      `;
    }

    function renderResults(room) {
      const q = room.currentQuestion;
      const answers = room.answers || {};
      const resultView = room.resultView || {};

      if (q.type === 'number') return renderNumberResults(q, answers, resultView, room.players);
      if (q.type === 'fixed') return renderFixedResults(q, answers, resultView, room.players);
      return renderTextResults(q, answers, resultView, room.players);
    }

    function renderNumberResults(q, answers, view, players) {
      const nums = Object.values(answers).map(a => Number(a.answer)).filter(n => !Number.isNaN(n));
      const avg = nums.length ? (nums.reduce((a, b) => a + b, 0) / nums.length).toFixed(2) : '---';
      const max = nums.length ? Math.max(...nums) : '---';

      return `
        <div class="result-layout">
          <h1 class="result-title">Resultado</h1>
          <h2 class="result-question">${escapeHtml(q.text)}</h2>
          <div class="result-grid">
            ${view.showAverage ? `<div class="panel result-panel"><h2>Média</h2><div class="big-code">${avg}</div></div>` : ''}
            ${view.showHighest ? `<div class="panel result-panel"><h2>Maior número</h2><div class="big-code">${max}</div></div>` : ''}
          </div>
          ${view.showEachAnswer ? eachAnswer(answers) : ''}
          ${scoreboard(players)}
        </div>
      `;
    }

    function renderFixedResults(q, answers, view, players) {
      const counts = {};
      q.options.forEach(o => counts[o] = 0);
      Object.values(answers).forEach(a => counts[a.answer] = (counts[a.answer] || 0) + 1);
      const max = Math.max(1, ...Object.values(counts));
      const total = Math.max(1, Object.values(counts).reduce((a, b) => a + b, 0));
      let degree = 0;
      const colors = ['#38bdf8', '#34d399', '#facc15', '#fb7185', '#a78bfa', '#f97316'];
      const conic = Object.entries(counts).map(([k, v], i) => {
        const start = degree;
        const size = (v / total) * 360;
        degree += size;
        return `${colors[i % colors.length]} ${start}deg ${degree}deg`;
      }).join(', ');

      return `
        <div class="result-layout">
          <h1 class="result-title">Resultado</h1>
          <h2 class="result-question">${escapeHtml(q.text)}</h2>
          <div class="result-grid">
            ${view.showBarChart ? `
              <div class="panel result-panel bar-panel">
                <h2>Gráfico de barras</h2>
                ${Object.entries(counts).map(([opt, count]) => `
                  <div class="bar-wrap">
                    <strong>${escapeHtml(opt)}</strong> — ${count}
                    <div class="bar" style="width:${Math.max(5, (count / max) * 100)}%"></div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
            ${view.showPieChart ? `<div class="panel result-panel"><h2>Pizza simples</h2><div class="pie" style="background: conic-gradient(${conic});"></div></div>` : ''}
          </div>
          ${view.showEachAnswer ? eachAnswer(answers) : ''}
          ${scoreboard(players)}
        </div>
      `;
    }

    function renderTextResults(q, answers, view, players) {
      return `
        <div class="result-layout">
          <h1 class="result-title">Respostas</h1>
          <h2 class="result-question">${escapeHtml(q.text)}</h2>
          ${eachAnswer(answers)}
          ${scoreboard(players)}
        </div>
      `;
    }

    function eachAnswer(answers) {
      const entries = Object.values(answers);
      if (!entries.length) return '<p>Nenhuma resposta ainda.</p>';
      return `
        <div class="panel viewer-answer-panel">
          <h2>Respostas dos jogadores</h2>
          <div class="list viewer-answer-list">
            ${entries.map(a => `<div class="item"><strong>${escapeHtml(a.name)}</strong><br>${escapeHtml(a.answer)}</div>`).join('')}
          </div>
        </div>
      `;
    }


    function fitViewerToScreen() {
      const panel = $('viewerPanel');
      const content = $('viewerContent');
      if (!panel || !content || panel.classList.contains('hidden')) return;

      content.style.transform = 'scale(1)';
      content.style.maxHeight = 'none';

      const availableW = Math.max(320, panel.clientWidth - 48);
      const availableH = Math.max(240, panel.clientHeight - 48);
      const rect = content.getBoundingClientRect();

      const scale = Math.min(1, availableW / rect.width, availableH / rect.height);
      content.style.transform = `scale(${Math.max(0.22, scale)})`;
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
